<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website All Projects</title>
    <style>
         :root {
            --bg: #0b1220;
            --surface: rgba(255,255,255,0.08);
            --surface-strong: rgba(255,255,255,0.14);
            --text: #e8eef8;
            --muted: #9ca3af;
            --accent: #60a5fa;
            --accent-strong: #38bdf8;
            --success: #34d399;
            --danger: #f472b6;
            --border: rgba(148,163,184,0.24);
            --shadow: 0 32px 90px rgba(15,23,42,0.28);
            --card: rgba(15,23,42,0.82);
            --accent-glow: rgba(56,189,248,0.25);
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 26%),
                        radial-gradient(circle at bottom right, rgba(34,197,94,0.14), transparent 24%),
                        linear-gradient(180deg, #07101f 0%, #0f172a 100%);
            transition: background 0.35s ease, color 0.35s ease;
        }


    </style>
</head>

<body>
    <header>
        <div class="hero">
            <p class="pill">All Projects • One File</p>
            <h1>JavaScript Mini Apps with Pro Styling</h1>
            <p class="lead">A polished single-page collection featuring validation, counters, filters, async flow, forms, calculator, image slider, and more — all built in one file.</p>
        </div>

        <div class="topbar">
            <button id="themeToggle">Toggle Theme</button>
            <div class="clock">Live Clock: <span id="digitalClock">00:00:00</span></div>
        </div>
    </header>
</body>
</html>
